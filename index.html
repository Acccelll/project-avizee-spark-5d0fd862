      Fallback runtime para configuração do backend.
      Em PWA instalado, um chunk JS antigo cacheado pelo service worker pode
      ter sido compilado com envs vazias (build antes das envs serem injetadas).
      O `index.html` sempre vem fresco da rede (navigateFallback do Workbox),
      então estas metas funcionam como fonte de verdade resiliente.
      `src/integrations/supabase/client.ts` lê delas como fallback quando
      `import.meta.env.VITE_SUPABASE_*` chegam vazios.
